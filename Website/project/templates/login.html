<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Irrigation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='script.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a class="brand" href="{{ url_for('home') }}">Smart Irrigation</a>
            <div class="nav-links">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('about') }}">About Us</a>
                <a href="{{ url_for('login') }}">Login</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="section login-section">
            <div class="login-panel">
                <h1 class="form-title">Login</h1>
                <p>Dashboard access ke liye login karein.</p>

                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% endif %}

                <form action="{{ url_for('login') }}" method="post" class="login-form">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>

                    <button type="submit">Login</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
